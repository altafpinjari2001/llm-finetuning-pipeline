# Llama 3.2 1B LoRA Fine-tuning Configuration

model:
  name: "meta-llama/Llama-3.2-1B"
  quantization: "4bit"   # 4bit, 8bit, or null

lora:
  rank: 16
  alpha: 32
  dropout: 0.05

data:
  train_file: "data/training_data.jsonl"
  template: "llama3"
  max_length: 2048
  val_split: 0.1

training:
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  scheduler: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.01

output_dir: "outputs/llama3-lora"
run_name: "llama3-lora-finetune"
report_to: "wandb"
